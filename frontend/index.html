<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco MVC - Painel</title>
    <link rel="stylesheet" href="style.css">
</head>




<body>
    <div class="container">
        <header>
            <h1>Sistema Bancário</h1>
            <p>Gerencie sua transações em tempo real</p>
        </header>

        <div class="card saldo-card">
            <h2>Saldo Atual</h2>
            <div class ="saldo-card" id="saldo">R$ 0,00</div>
        </div>
        
        <div class="card operacoes-card">
            <h3>Realizar Transações</h3>

            <label for="valor">Valor (R$):</label>
            <input type="number" id="valor" placeholder="Ex: 150.00" step="0.01">

            <div class="bototes">
                <button id="btn-depositar" class="btn btn-deposito">Depositar</button>
                <button id="btn-sacar" class="btn btn-saque">Sacar</button>
            </div>
        </div>
        
        <div id="mensagem" class="mensagem"></div>
    </div>

    <script src="app.js"></script>

</body>
</html>
